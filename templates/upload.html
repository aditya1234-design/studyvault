<!DOCTYPE html>
<html>
<head>
    <title>Upload Material</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav>
    <div class="logo">📚 StudyVault</div>
</nav>

<div class="hero">

    <h1>Upload Material</h1>

    <p>
        Share notes with other students
    </p>

</div>

<div style="max-width:700px;margin:auto;padding:30px;">

<form method="POST"
      enctype="multipart/form-data">

<label>Title</label>
<br><br>

<input
type="text"
name="title"
placeholder="Enter title"
class="search-box"
required>

<br><br>

<label>Subject</label>
<br><br>

<select
name="subject"
class="search-box">

<option>DBMS</option>

<option>Web Technology</option>

<option>DAA</option>

<option>OOPS with C++</option>

<option>Soft Computing</option>

<option>DBMS Lab</option>

<option>WT Lab</option>

<option>DAA Lab</option>

<option>Mini Project</option>

<option>Constitution of India</option>

<option>Extras</option>

</select>

<br><br>

<label>Select File</label>

<br><br>

<input
type="file"
name="file"
required>

<br><br><br>

<button class="upload-btn">

Upload Material

</button>

</form>

</div>

</body>
</html>
