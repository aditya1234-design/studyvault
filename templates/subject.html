<!DOCTYPE html>
<html>

<head>

<title>{{ subject_name }}</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<nav>

<div class="logo">

📚 StudyVault

</div>

</nav>

<div class="hero">

<h1>{{ subject_name }}</h1>

<p>

Approved Study Materials

</p>

</div>

<div class="subjects">

<div class="card-container">

{% if materials %}

{% for material in materials %}

<div class="card">

<h3>{{ material[1] }}</h3>

<p>
Subject:
{{ material[2] }}
</p>

<p>
Status:
{{ material[4] }}
</p>

<br>

<a href="/download/{{ material[3] }}">

<button class="upload-btn">

Download

</button>

</a>

</div>

{% endfor %}

{% else %}

<div class="card">

<h3>No Materials Available</h3>

<p>

No approved notes have been uploaded yet.

</p>

</div>

{% endif %}

</div>

</div>

</body>

</html>
